name: ci
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-type-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
          # Cache disabled during the scaffold-only phase because the
          # default cache-dependency-glob (**/uv.lock) errors out when no
          # uv.lock has been generated yet. Re-enable once the first
          # `uv sync` has been committed.
          enable-cache: false
      - name: Set up Python
        run: uv python install 3.11
      - name: Sync deps
        run: uv sync --all-extras --dev
      - name: Ruff lint
        run: uv run ruff check src tests
      - name: Ruff format check
        run: uv run ruff format --check src tests
      - name: Mypy
        # Mypy is intentionally scoped only to the package's typed
        # skeleton (__init__, _version, config, cli) during the
        # scaffold-only phase. Per-module additions land alongside the
        # implementations they cover.
        run: uv run mypy src/scgpt_neurodegen_probe/__init__.py src/scgpt_neurodegen_probe/_version.py src/scgpt_neurodegen_probe/config.py src/scgpt_neurodegen_probe/cli.py
      - name: Pytest
        # Coverage threshold not enforced while this repo is
        # scaffold-only; §2.4's 70% floor returns when the first real
        # implementation lands.
        run: uv run pytest --cov=scgpt_neurodegen_probe --cov-report=xml
      - name: Upload coverage
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
        if: ${{ env.CODECOV_TOKEN != '' }}

site_name: scgpt-neurodegen-probe
site_description: A zero-shot probe of single-cell foundation models on neurodegeneration benchmarks with biologically defensible ground truth.
site_url: https://abayatibrain.github.io/scgpt-neurodegen-probe/
repo_url: https://github.com/abayatibrain/scgpt-neurodegen-probe
repo_name: abayatibrain/scgpt-neurodegen-probe
edit_uri: edit/main/docs/

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - content.code.copy
    - content.code.annotate
  palette:
    - scheme: default
      primary: indigo
      accent: deep orange
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: deep orange
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            show_source: false
            docstring_style: numpy

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Biology primer: biology.md
  - Architecture: architecture.md
  - API reference: api.md
  - Decision log:
      - decisions/index.md
